server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/status {
        alias /data/last_update.json;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    location /data/ {
        alias /data/;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=3600";
    }
}